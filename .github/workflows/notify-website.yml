name: Notify Website on PR Merge
on:
  pull_request:
    types: [closed]
    branches: [main]
jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to website repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_PAT }}
          repository: Satya-Siba-Nayak/Flux-Extension-Website
          event-type: contributor-merged
          client-payload: '{"pr": "${{ github.event.pull_request.number }}", "user": "${{ github.event.pull_request.user.login }}"}'
