<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  
  <header>
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <h1>Convert</h1>
    </div>
    
    <button id="sitePower" class="power-btn active" title="Toggle on this site">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
    </button>
  </header>

  <main>
    <section class="exchange-section">
      <div class="currency-selectors">
        <div class="select-group">
          <label>From</label>
          <select id="baseCurrency">
            <option value="usd">USD ($)</option>
            <option value="eur">EUR (€)</option>
            <option value="gbp">GBP (£)</option>
            <option value="inr">INR (₹)</option>
            <option value="jpy">JPY (¥)</option>
            <option value="cad">CAD (C$)</option>
            <option value="aud">AUD (A$)</option>
            <option value="chf">CHF (CHF)</option>
            <option value="cny">CNY (CN¥)</option>
            <option value="sgd">SGD (S$)</option>
          </select>
        </div>
        
        <button id="swapCurrencies" class="swap-btn" title="Swap currencies">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="14" x2="21" y2="3"/><polyline points="8 21 3 21 3 16"/><line x1="20" y1="10" x2="3" y2="21"/></svg>
        </button>

        <div class="select-group">
          <label>To</label>
          <select id="targetCurrency">
            <option value="usd">USD ($)</option>
            <option value="eur">EUR (€)</option>
            <option value="gbp">GBP (£)</option>
            <option value="inr" selected>INR (₹)</option>
            <option value="jpy">JPY (¥)</option>
            <option value="cad">CAD (C$)</option>
            <option value="aud">AUD (A$)</option>
            <option value="chf">CHF (CHF)</option>
            <option value="cny">CNY (CN¥)</option>
            <option value="sgd">SGD (S$)</option>
          </select>
        </div>
      </div>

      <div class="rate-display">
        <div style="display: flex; flex-direction: column; gap: 4px;">
          <span class="rate-val" id="currentRate">Loading...</span>
          <span class="rate-meta" id="lastUpdated">Updated just now</span>
        </div>
        <button id="refreshRate" class="icon-btn" title="Refresh rate">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
    </section>

    <section class="settings-section">
      <div class="setting-item">
        <div class="setting-info">
          <span class="title">Status Badge</span>
          <span class="desc">Show ≈ indicator on prices</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="showBadge">
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="setting-item">
        <div class="setting-info">
          <span class="title">Global Enable</span>
          <span class="desc">Convert across all sites</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="enabled">
          <span class="slider"></span>
        </label>
      </div>
    </section>
    
    <div id="disabledSection" class="disabled-section" style="display: none;">
      <h3 class="section-title">Disabled Sites</h3>
      <div id="disabledList" class="disabled-list"></div>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
